apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: magic-tavern-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joncax/nerv-gitops.git
    targetRevision: main
    path: apps/magic-tavern
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: magic-tavern-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
