apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nerv-dashboard-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/joncax/nerv-gitops.git
    targetRevision: main
    path: apps/nerv-dashboard
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nerv-dashboard-dev
  syncPolicy:
    syncOptions:
      - CreateNamespace=true