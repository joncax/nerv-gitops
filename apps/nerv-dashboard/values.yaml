# Namespace onde a app é instalada
namespace: nerv-dashboard

# ServiceAccount / RBAC
serviceAccount:
    name: nerv-dashboard-sa

# Images
image:
    registry: ghcr.io/joncax
    backend:
        repository: nerv-dashboard-backend
        tag: "latest"
    frontend:
        repository: nerv-dashboard-frontend
        tag: "latest"
    pullPolicy: IfNotPresent
    pullSecret: ghcr-secret

# Backend
backend:
    replicas: 1
    hostNetwork: true
    containerPort: 8000
    port: 8000
    nodePort: 30081
    env:
        pythonUnbuffered: "1"
        hostProc: "/host/proc"
        hostDiskMybook: "/mnt/MyBook500GB"
        hostDiskPassport: "/mnt/Passport2TB"
        magiAgentUrl: "http://127.0.0.1:8888"

# Frontend
frontend:
    replicas: 1
    port: 80
    nodePort: 30080