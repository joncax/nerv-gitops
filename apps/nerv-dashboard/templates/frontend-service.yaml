apiVersion: v1
kind: Service
metadata:
  name: nerv-dashboard-frontend
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: nerv-dashboard-frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
      nodePort: {{ .Values.frontend.nodePort }}