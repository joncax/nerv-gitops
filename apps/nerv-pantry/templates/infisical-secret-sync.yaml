apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalConnection
metadata:
  name: nerv-pantry-infisical-connection
  namespace: {{ .Values.namespace }}
spec:
  address: {{ .Values.infisical.connectionAddress }}
---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalAuth
metadata:
  name: nerv-pantry-k8s-operator-auth
  namespace: {{ .Values.namespace }}
spec:
  infisicalConnectionRef:
    name: nerv-pantry-infisical-connection
    namespace: {{ .Values.namespace }}
  method: universal
  universal:
    clientIdRef:
      name: {{ .Values.infisical.machineIdentitySecretName }}
      namespace: {{ .Values.namespace }}
      key: clientId
    clientSecretRef:
      name: {{ .Values.infisical.machineIdentitySecretName }}
      namespace: {{ .Values.namespace }}
      key: clientSecret
---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: nerv-pantry-backend-secret-sync
  namespace: {{ .Values.namespace }}
spec:
  infisicalAuthRef:
    name: nerv-pantry-k8s-operator-auth
    namespace: {{ .Values.namespace }}
  sources:
    - projectId: {{ .Values.infisical.projectId | quote }}
      environmentSlug: {{ .Values.infisical.environmentSlug }}
      secretPath: /
  targets:
    - name: {{ .Values.backend.secretName }}
      namespace: {{ .Values.namespace }}
      kind: Secret
      creationPolicy: Owner
      secretType: Opaque
  syncOptions:
    refreshInterval: 60s
    instantUpdates: true
